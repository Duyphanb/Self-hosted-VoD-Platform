name: vod-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vod_platform}
      POSTGRES_USER: ${POSTGRES_USER:-vod_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vod_app} -d ${POSTGRES_DB:-vod_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vod_internal

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - vod_internal

  rabbitmq:
    image: rabbitmq:3.13-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-vod_app}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vod_internal

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-vod_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-me}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vod_internal

  flyway:
    image: flyway/flyway:12.10.0
    command:
      - -url=jdbc:postgresql://${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-vod_platform}
      - -user=${POSTGRES_USER:-vod_app}
      - -password=${POSTGRES_PASSWORD:-change-me}
      - -connectRetries=60
      - -locations=filesystem:/flyway/sql
      - migrate
    volumes:
      - ../backend/common/src/main/resources/db/migration:/flyway/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vod_internal

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-vod_minio} ${MINIO_SECRET_KEY:-change-me}; do sleep 2; done;
      mc mb --ignore-existing local/${MINIO_BUCKET_RAW:-vod-raw};
      mc mb --ignore-existing local/${MINIO_BUCKET_HLS:-vod-hls};
      mc mb --ignore-existing local/${MINIO_BUCKET_THUMBNAILS:-vod-thumbnails};
      mc anonymous set none local/${MINIO_BUCKET_RAW:-vod-raw};
      mc anonymous set none local/${MINIO_BUCKET_HLS:-vod-hls};
      mc anonymous set none local/${MINIO_BUCKET_THUMBNAILS:-vod-thumbnails};
      "
    networks:
      - vod_internal

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/vod_platform}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-vod_app}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change-me}
      JWT_SECRET: ${JWT_SECRET:-change-me-use-a-long-random-secret}
      JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES:-60}
      JWT_REFRESH_TOKEN_TTL_DAYS: ${JWT_REFRESH_TOKEN_TTL_DAYS:-7}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-vod_app}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me}
      RABBITMQ_ENCODING_QUEUE: ${RABBITMQ_ENCODING_QUEUE:-video-encoding-queue}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-vod_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-vod-raw}
      MINIO_BUCKET_HLS: ${MINIO_BUCKET_HLS:-vod-hls}
      MINIO_BUCKET_THUMBNAILS: ${MINIO_BUCKET_THUMBNAILS:-vod-thumbnails}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-2048}
      ALLOWED_VIDEO_MIME_TYPES: ${ALLOWED_VIDEO_MIME_TYPES:-video/mp4,video/x-matroska,video/webm,video/quicktime}
      TEMP_UPLOAD_DIR: ${TEMP_UPLOAD_DIR:-/tmp/vod-uploads}
    depends_on:
      flyway:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - vod_internal

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      FFMPEG_PATH: ${FFMPEG_PATH:-ffmpeg}
      FFPROBE_PATH: ${FFPROBE_PATH:-ffprobe}
      WORKER_TEMP_DIR: ${WORKER_TEMP_DIR:-/tmp/vod-worker}
      HLS_SEGMENT_SECONDS: ${HLS_SEGMENT_SECONDS:-6}
      HLS_TARGET_HEIGHT: ${HLS_TARGET_HEIGHT:-720}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/vod_platform}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-vod_app}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change-me}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-vod_app}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-change-me}
      RABBITMQ_ENCODING_QUEUE: ${RABBITMQ_ENCODING_QUEUE:-video-encoding-queue}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-vod_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me}
      MINIO_BUCKET_RAW: ${MINIO_BUCKET_RAW:-vod-raw}
      MINIO_BUCKET_HLS: ${MINIO_BUCKET_HLS:-vod-hls}
      MINIO_BUCKET_THUMBNAILS: ${MINIO_BUCKET_THUMBNAILS:-vod-thumbnails}
    depends_on:
      flyway:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - vod_internal

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - vod_internal

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - vod_internal

networks:
  vod_internal:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
