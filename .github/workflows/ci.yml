name: CI

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-build:
    name: Backend Maven build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test all backend modules
        working-directory: backend
        run: mvn -B -ntp verify

  worker-build:
    name: Worker Maven build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test all worker modules
        working-directory: worker
        run: mvn -B -ntp verify

  skeleton:
    name: Skeleton build checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml config

      - name: Build backend image
        run: docker build -t vod-backend-skeleton ./backend

      - name: Build worker image
        run: docker build -t vod-worker-skeleton ./worker

      - name: Verify worker media tools
        run: docker run --rm vod-worker-skeleton sh -c "ffmpeg -version >/dev/null && ffprobe -version >/dev/null"

      - name: Build frontend image
        run: docker build -t vod-frontend-skeleton ./frontend

      - name: Build compose application images
        run: docker compose -f deploy/docker-compose.yml build backend worker frontend
